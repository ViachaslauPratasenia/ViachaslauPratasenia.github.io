<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Personal Website created with Flutter">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafaf9">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#161b20">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Viachaslau Pratasenia">
  <link rel="apple-touch-icon" href="icons/apple-icon-180x180.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png"/>

  <title>Viachaslau Pratasenia</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash shown until Flutter paints its first frame. Colors mirror the
       app's OKLCH palette so the handoff is seamless in both themes. */
    html, body {
      margin: 0;
      height: 100%;
      background: #fafaf9;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #161b20; }
    }
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #fafaf9;
      z-index: 9999;
      transition: opacity 240ms ease-out;
      font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #splash .brand {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #171613;
      animation: splash-pulse 1.6s ease-in-out infinite;
    }
    #splash .brand .dot { color: #e6443a; }
    #splash .bar {
      width: 72px;
      height: 1px;
      background: rgba(23, 22, 19, 0.15);
      overflow: hidden;
      position: relative;
    }
    #splash .bar::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 36px;
      background: #e6443a;
      animation: splash-slide 1.1s ease-in-out infinite;
    }
    @media (prefers-color-scheme: dark) {
      #splash { background: #161b20; }
      #splash .brand { color: #eaebed; }
      #splash .bar { background: rgba(234, 235, 237, 0.15); }
    }
    #splash.done { opacity: 0; pointer-events: none; }
    @keyframes splash-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    @keyframes splash-slide {
      0% { transform: translateX(-36px); }
      100% { transform: translateX(72px); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="brand">Viachaslau Pratasenia<span class="dot">.</span></div>
    <div class="bar"></div>
  </div>

  <script>
    // Remove the splash once Flutter has painted its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (!splash) return;
      splash.classList.add('done');
      splash.addEventListener('transitionend', function () { splash.remove(); });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
