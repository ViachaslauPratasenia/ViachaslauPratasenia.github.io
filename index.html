    /* Splash shown until Flutter paints its first frame. Colors mirror the
       app's OKLCH palette so the handoff is seamless in both themes. */
    html, body {
      margin: 0;
      height: 100%;
      background: #fafaf9;
    }

      html, body { background: #161b20; }

    /* The splash content stays invisible for the first ~250ms: fast loads
       never see it, slower loads get a gentle fade-in instead of a flash.
       The page background still covers the app area the whole time. */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #fafaf9;
      z-index: 9999;
      opacity: 0;
      transition: opacity 220ms ease;
      font-family: 'Inter Brand', ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #splash.show { opacity: 1; }
    #splash .brand {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #171613;
      animation: splash-pulse 1.6s ease-in-out infinite;
    }
    #splash .brand .dot { color: #e6443a; }
    #splash .bar {
      width: 72px;
      height: 1px;
      background: rgba(23, 22, 19, 0.15);
      overflow: hidden;
      position: relative;
    }
    #splash .bar::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 36px;
      background: #e6443a;
      animation: splash-slide 1.1s ease-in-out infinite;
    }
    @media (prefers-color-scheme: dark) {
      #splash { background: #161b20; }
      #splash .brand { color: #eaebed; }
      #splash .bar { background: rgba(234, 235, 237, 0.15); }
    }
    #splash.done { opacity: 0; pointer-events: none; }
    @keyframes splash-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    @keyframes splash-slide {
      0% { transform: translateX(-36px); }
      100% { transform: translateX(72px); }
    }

  </div>

  <script>
    // Splash choreography: appear only after a short grace period, and once
    // visible, stay long enough that fast loads don't produce a flash.
    (function () {
      var APPEAR_DELAY = 250;   // fast loads never see the splash
      var MIN_VISIBLE = 600;    // once shown, hold at least this long
      var splash = document.getElementById('splash');
      var shownAt = null;
      var appearTimer = setTimeout(function () {
        shownAt = performance.now();
        splash.classList.add('show');
      }, APPEAR_DELAY);

      function hide() {
        splash.classList.remove('show');
        splash.classList.add('done');
        // transitionend may not fire if no transition ran — remove anyway.
        setTimeout(function () { splash.remove(); }, 400);
      }

      window.addEventListener('flutter-first-frame', function () {
        if (!splash) return;
        if (shownAt === null) {
          // Never became visible — drop it instantly, no transition.
          clearTimeout(appearTimer);
          splash.remove();
          return;
        }
        var left = MIN_VISIBLE - (performance.now() - shownAt);
        setTimeout(hide, Math.max(0, left));
      });
    })();
  </script>
